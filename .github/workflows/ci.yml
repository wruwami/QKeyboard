name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    name: ${{ matrix.os }} / Qt ${{ matrix.qt-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        qt-version: ['5.15.2', '6.7.3']

    env:
      QT_QPA_PLATFORM: offscreen

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Qt 5.15/6.7 macOS binaries still reference the legacy AGL framework
      # in their .prl files; recent Xcode SDKs dropped AGL entirely, which
      # breaks linking ("ld: framework 'AGL' not found") against a runner's
      # default (newest) Xcode. Pin an older Xcode whose SDK still ships it.
      - name: Select Xcode (macOS AGL framework workaround)
        if: matrix.os == 'macos-latest'
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.4'

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ matrix.qt-version }}
          # QtDeclarative (Qml/Quick) ships as part of the base desktop
          # install on both Qt5 and Qt6 via aqt, not as an addon module —
          # requesting it explicitly 404s ("packages ... were not found").
          cache: true

      # lcov/gcov-based coverage only works with the GCC toolchain used on
      # ubuntu-latest; Windows (MSVC) and macOS (Clang) legs skip it and just
      # build+test.
      - name: Install lcov
        if: matrix.os == 'ubuntu-latest' && startsWith(matrix.qt-version, '6')
        run: sudo apt-get update && sudo apt-get install -y lcov

      - name: Configure
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Debug
          -DQKW_ENABLE_COVERAGE=${{ (matrix.os == 'ubuntu-latest' && startsWith(matrix.qt-version, '6')) && 'ON' || 'OFF' }}

      # --config Debug is a no-op on single-config generators (Unix
      # Makefiles/Ninja, used on Linux/macOS) but required on Windows' default
      # multi-config Visual Studio generator, where CMAKE_BUILD_TYPE is
      # ignored.
      - name: Build
        run: cmake --build build --parallel --config Debug

      # -C Debug is likewise required for ctest to find the Windows
      # multi-config build's test binaries ("Test not available without
      # configuration" otherwise); harmless on the single-config generators.
      - name: Test
        run: ctest --test-dir build --output-on-failure -C Debug

      # Coverage is only collected once (the ubuntu+Qt6 leg) to avoid
      # uploading duplicate reports to Codecov.
      - name: Collect coverage
        if: matrix.os == 'ubuntu-latest' && startsWith(matrix.qt-version, '6')
        run: |
          lcov --capture --directory build --output-file coverage.info --ignore-errors inconsistent,gcov,mismatch
          lcov --remove coverage.info '/usr/*' '*/tests/*' '*/examples/*' --ignore-errors unused --output-file coverage.info
          lcov --list coverage.info

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && startsWith(matrix.qt-version, '6')
        uses: codecov/codecov-action@v4
        with:
          files: coverage.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
