name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: clang-format + cppcheck
    runs-on: ubuntu-latest
    permissions:
      contents: write
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # actions/checkout's default ref for a pull_request event is the
          # synthetic refs/pull/N/merge commit, which isn't a real branch -
          # pushing a fix there would go nowhere. Check out the PR's actual
          # head branch (falling back to the pushed branch for `push`
          # events, where github.head_ref is unset) so the commit below has
          # somewhere real to land.
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Install clang-format and cppcheck
        run: sudo apt-get update && sudo apt-get install -y clang-format cppcheck

      # Formatting is config-driven (.clang-format) rather than a fixed
      # tool version's defaults, so this stays stable across clang-format
      # releases. Scans the same source set cppcheck below does.
      #
      # Auto-fixes in place and pushes the result instead of just failing
      # the build: clang-format is deterministic given .clang-format, so
      # there's no judgment call for a human reviewer to make here - only
      # failing and waiting for someone to notice, run `clang-format -i`
      # locally, and push again is a pure round-trip for a mechanical fix.
      # Pushing a commit here re-triggers this workflow, but that second
      # run finds nothing left to fix and doesn't push again, so it's
      # self-terminating. Only works for same-repo branches/PRs - a fork
      # PR's GITHUB_TOKEN can't push back to the fork, so the push step
      # below fails closed (correctly still blocking the check) rather
      # than silently skipping enforcement.
      - name: clang-format (auto-fix and commit)
        run: |
          files=$(find src include tests examples -name '*.cpp' -o -name '*.h')
          clang-format -i $files
          # Diff/add the whole directories rather than re-using the
          # unquoted $files word list here: this project's filenames never
          # contain spaces, but if that ever changed, splitting $files on
          # whitespace could silently miss a changed file in this check
          # (git add/diff still working file-by-file for clang-format
          # itself above is fine either way, since a missed word there
          # would just mean that file wasn't reformatted, not a silent
          # false "nothing changed").
          if ! git diff --quiet -- src include tests examples; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add src include tests examples
            git commit -m "style: apply clang-format"
            git push origin HEAD:${{ github.head_ref || github.ref_name }}
          fi

      # --enable=warning,style,performance,portability without
      # unusedFunction/missingIncludeSystem (see .cppcheck-suppressions for
      # why); -I include so cppcheck can resolve this project's own headers
      # even without a Qt install on PATH.
      - name: cppcheck
        run: |
          cppcheck --std=c++17 --language=c++ \
            --enable=warning,style,performance,portability \
            --inline-suppr \
            --suppressions-list=.cppcheck-suppressions \
            --xml --xml-version=2 \
            -I include \
            src include tests examples 2> cppcheck.xml
            
      - name: Convert Cppcheck XML to SARIF
        uses: Flast/cppcheck-sarif@v2
        with:
          input: cppcheck.xml
          output: cppcheck.sarif

      - name: Upload SARIF to GitHub
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: cppcheck.sarif
          
  build-and-test:
    name: ${{ matrix.os }} / Qt ${{ matrix.qt-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        qt-version: ['5.15.2', '6.7.3']

    env:
      QT_QPA_PLATFORM: offscreen

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ matrix.qt-version }}
          # QtDeclarative (Qml/Quick) ships as part of the base desktop
          # install on both Qt5 and Qt6 via aqt, not as an addon module —
          # requesting it explicitly 404s ("packages ... were not found").
          cache: true

      # lcov/gcov-based coverage only works with the GCC toolchain used on
      # ubuntu-latest; Windows (MSVC) and macOS (Clang) legs skip it and just
      # build+test.
      - name: Install lcov
        if: matrix.os == 'ubuntu-latest' && startsWith(matrix.qt-version, '6')
        run: sudo apt-get update && sudo apt-get install -y lcov

      # Legacy framework AGL was removed from macOS SDKs starting with macOS 14.
      # Older Qt6 releases (such as 6.7.3) still reference it in their CMake/prl configs,
      # which fails link steps on modern macOS runners. Strip it from the installed Qt.
      - name: Patch macOS AGL framework reference in Qt
        if: matrix.os == 'macos-latest' && startsWith(matrix.qt-version, '6')
        run: |
          if [ -d "$QT_ROOT_DIR" ]; then
            echo "=== Files containing AGL before patch ==="
            find "$QT_ROOT_DIR" -type f \( -name "*.cmake" -o -name "*.prl" -o -name "*.pc" \) -exec grep -inH "AGL" {} + || true

            # Replace various ways AGL might be linked (case-insensitive where supported)
            find "$QT_ROOT_DIR" -type f \( -name "*.cmake" -o -name "*.prl" -o -name "*.pc" \) -exec sed -i '' 's/-framework AGL//g' {} +
            find "$QT_ROOT_DIR" -type f \( -name "*.cmake" -o -name "*.prl" -o -name "*.pc" \) -exec sed -i '' 's/-framework agl//g' {} +
            find "$QT_ROOT_DIR" -type f \( -name "*.cmake" -o -name "*.prl" -o -name "*.pc" \) -exec sed -i '' 's/;AGL;/;/g' {} +
            find "$QT_ROOT_DIR" -type f \( -name "*.cmake" -o -name "*.prl" -o -name "*.pc" \) -exec sed -i '' 's/;AGL//g' {} +
            find "$QT_ROOT_DIR" -type f \( -name "*.cmake" -o -name "*.prl" -o -name "*.pc" \) -exec sed -i '' 's/AGL;//g' {} +

            echo "=== Files containing AGL after patch ==="
            find "$QT_ROOT_DIR" -type f \( -name "*.cmake" -o -name "*.prl" -o -name "*.pc" \) -exec grep -inH "AGL" {} + || true
          fi

      # Qt 5.15.2 never shipped a native Apple Silicon macOS build (Qt's
      # arm64 macOS support starts at Qt6); the runner is Apple Silicon and
      # defaults to arm64, so without forcing x86_64 here every link against
      # Qt5's Intel-only libraries fails with
      # "symbol(s) not found for architecture arm64". Built x86_64 binaries
      # still run fine under Rosetta 2, which GitHub's macOS runners ship
      # preinstalled.
      - name: Configure
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Debug
          -DQKW_ENABLE_COVERAGE=${{ (matrix.os == 'ubuntu-latest' && startsWith(matrix.qt-version, '6')) && 'ON' || 'OFF' }}
          ${{ (matrix.os == 'macos-latest' && startsWith(matrix.qt-version, '5')) && '-DCMAKE_OSX_ARCHITECTURES=x86_64' || '' }}
          ${{ (matrix.os == 'macos-latest' && startsWith(matrix.qt-version, '6')) && '-DWrapOpenGL_AGL="-framework OpenGL" -DOPENGL_agl_LIBRARY="-framework OpenGL"' || '' }}

      - name: Patch generated build files to strip AGL framework on macOS
        if: matrix.os == 'macos-latest' && startsWith(matrix.qt-version, '6')
        run: |
          if [ -d "build" ]; then
            echo "=== Files containing AGL in build before patch ==="
            find build -type f -exec grep -inH "AGL" {} + || true

            find build -type f \( -name "Makefile" -o -name "*.make" -o -name "link.txt" -o -name "*.cmake" -o -name "CMakeCache.txt" \) -exec sed -i '' 's/-framework AGL//g' {} +
            find build -type f \( -name "Makefile" -o -name "*.make" -o -name "link.txt" -o -name "*.cmake" -o -name "CMakeCache.txt" \) -exec sed -i '' 's/AGL.framework/OpenGL.framework/g' {} +

            echo "=== Files containing AGL in build after patch ==="
            find build -type f -exec grep -inH "AGL" {} + || true
          fi

      # --config Debug is a no-op on single-config generators (Unix
      # Makefiles/Ninja, used on Linux/macOS) but required on Windows' default
      # multi-config Visual Studio generator, where CMAKE_BUILD_TYPE is
      # ignored.
      - name: Build
        run: cmake --build build --parallel --config Debug

      # -C Debug is likewise required for ctest to find the Windows
      # multi-config build's test binaries ("Test not available without
      # configuration" otherwise); harmless on the single-config generators.
      #
      # QT_DEBUG_PLUGINS on Windows only: tst_keybutton and tst_quick
      # (QTEST_MAIN/QUICK_TEST_MAIN, need a QApplication/QGuiApplication+
      # QQmlEngine) fail on windows-latest with zero captured stdout via
      # ctest --output-on-failure, unlike every other test in this project
      # (including tst_keyboardwidget, which also uses QTEST_MAIN but never
      # show()s a window). Surfaces Qt's own plugin-loading diagnostics in
      # case that's the cause. Remove once root-caused.
      - name: Test
        shell: bash
        env:
          QT_DEBUG_PLUGINS: ${{ matrix.os == 'windows-latest' && '1' || '' }}
        run: |
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            xvfb-run ctest --test-dir build --output-on-failure -C Debug
          else
            ctest --test-dir build --output-on-failure -C Debug
          fi

      # ctest's --output-on-failure captures nothing for tst_keybutton/
      # tst_quick on windows-latest (see above) — run them directly so their
      # real stdout/stderr (and, on a crash, whatever the process managed to
      # flush) reaches the CI log instead of being swallowed by ctest's own
      # capture. Diagnostic only: never fails the job by itself, since the
      # ctest step above already does.
      - name: Directly run GUI tests for diagnostics (Windows only)
        if: always() && matrix.os == 'windows-latest'
        continue-on-error: true
        shell: pwsh
        run: |
          Write-Host "=== tst_keybutton ==="
          & "build\tests\Debug\tst_keybutton.exe"
          Write-Host "exit code: $LASTEXITCODE"
          Write-Host "=== tst_quick ==="
          & "build\tests\Debug\tst_quick.exe"
          Write-Host "exit code: $LASTEXITCODE"

      # Coverage is only collected once (the ubuntu+Qt6 leg) to avoid
      # uploading duplicate reports to Codecov.
      - name: Collect coverage
        if: matrix.os == 'ubuntu-latest' && startsWith(matrix.qt-version, '6')
        run: |
          lcov --capture --directory build --output-file coverage.info --ignore-errors inconsistent,gcov,mismatch
          lcov --remove coverage.info '/usr/*' '*/tests/*' '*/examples/*' --ignore-errors unused --output-file coverage.info
          lcov --list coverage.info

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && startsWith(matrix.qt-version, '6')
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.info
          token: ${{ secrets.CODECOV_TOKEN }}
          disable_search: true
          fail_ci_if_error: true
